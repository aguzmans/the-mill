# Convenience compose for Mill.
#
#   Local runtime stack (Gate 2 — controller + queue + worker):
#     docker compose up redis api worker      # API at http://localhost:8787
#     bun scripts/e2e-smoke.ts                # end-to-end smoke test (after up)
#
#   Web prototype:
#     docker compose up web                   # serve the UI at http://localhost:8080
#     docker compose run --rm e2e             # run the Playwright suite
#
# The api/worker use the official Bun image with the repo mounted, so there's no image
# build for local dev (Dockerfiles for a shipped image land at M6). node_modules is the
# host-installed one (pure-JS deps), shared into the containers via the mount.
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Persistence: AOF (appendfsync everysec) + the default RDB snapshots, so a restart keeps
    # jobs/history/journal. maxmemory-policy volatile-ttl evicts the nearest-to-expire job keys
    # first if MILL_REDIS_MAXMEMORY is hit (the queue/registry keys have no TTL, so they're never
    # evicted). Size MILL_REDIS_MAXMEMORY from docs/DEPLOYMENT.md § Redis sizing.
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory ${MILL_REDIS_MAXMEMORY:-1gb}
      --maxmemory-policy volatile-ttl
    volumes:
      - redis-data:/data   # mount a real volume in prod so persistence survives restarts
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: mill-backend
    command: bun /app/apps/api/src/server.ts
    restart: unless-stopped
    environment:
      # The controller clones this repo and reconciles a working copy toward it.
      # Point it at your own GitHub repo via a .env file (see .env.example).
      - PROJECT_REPO=${PROJECT_REPO:-file:///app/project-repo.git}
      - PROJECT_BRANCH=${PROJECT_BRANCH:-main}
      - GIT_TOKEN=${GIT_TOKEN:-}
      - WORKDIR=/app/workdir
      - RECONCILE_INTERVAL_MS=${RECONCILE_INTERVAL_MS:-15000}
      - REDIS_URL=redis://redis:6379
      - PORT=8080
      - MILL_INGRESS_TOKEN=${MILL_INGRESS_TOKEN:-}   # bearer token for the /p tokenized ingress
      - MILL_ADMIN_TOKEN=${MILL_ADMIN_TOKEN:-}   # when set, /api/* requires this bearer (except /health, /metrics)
      - MILL_PUBLIC_WEBHOOK_URL=${MILL_PUBLIC_WEBHOOK_URL:-}   # public /p ingress origin the UI shows for webhook URLs (else it uses the browser origin)
      - MILL_CORS_ORIGINS=${MILL_CORS_ORIGINS:-}
      - DEPS_TOKEN=${DEPS_TOKEN:-}   # per-project ingress token (demo)
      - MILL_AUTOSYNC=${MILL_AUTOSYNC:-true}   # false → validate but hold new revisions (manual Sync applies)
      - MILL_JOB_TTL_SECONDS=${MILL_JOB_TTL_SECONDS:-604800}   # job/event/journal retention (default 7 days)
      - MILL_COMPLETED_MAX=${MILL_COMPLETED_MAX:-5000}         # rolling cap on the dashboard completed-runs list
    volumes:
      - workdir:/app/workdir   # shared working copy (PVC-equivalent) so workers see reconciled code
    ports:
      - "8787:8080"
    depends_on:
      - redis

  # Mirrors an EKS *worker Deployment*: a separate, HPA-scaled set of pods that pull jobs
  # from the queue and run each node IN-PROCESS. The pod itself is the isolation boundary —
  # so this container is hardened like a locked-down pod (non-root, read-only rootfs, all
  # caps dropped, no-new-privileges) with resource limits standing in for the pod requests/
  # limits. It never runs alongside the api. (MILL_EXECUTOR is intentionally unset — docker
  # mode is a local-only trick and is NOT how k8s runs; see docs/DEPLOYMENT.md §Isolation.)
  worker:
    image: mill-backend
    command: bun /app/apps/worker/src/worker.ts
    restart: unless-stopped
    read_only: true               # pod securityContext.readOnlyRootFilesystem
    tmpfs:
      - /tmp                       # the only writable path the runtime needs
    cap_drop:
      - ALL                        # pod securityContext.capabilities.drop: [ALL]
    security_opt:
      - no-new-privileges:true     # pod securityContext.allowPrivilegeEscalation: false
    environment:
      - HOME=/tmp                  # keep any runtime cache writes on the tmpfs
      - REDIS_URL=redis://redis:6379
      - MILL_CONC_MIN=1
      - MILL_CONC_MAX=8
      - MILL_MEM_MAX_MB=1024       # match the memory limit below (pod memory limit)
      - MILL_JOB_TTL_SECONDS=${MILL_JOB_TTL_SECONDS:-604800}   # must match the api (job key TTL)
      # Flat secrets, as k8s Secrets would be injected on EKS (each node still sees only its declared refs).
      - MILL_SECRETS={"WAREHOUSE_DSN":"postgres://demo","SMTP_URL":"smtp://demo","API_URL":"https://demo","WEBHOOK_SECRET":"whsec_test_123"}
    # NO shared workdir: the worker fetches each job's project bundle from Redis into its own
    # ephemeral /tmp (the Windmill model). The controller↔worker shared volume is gone.
    deploy:
      replicas: 2                  # a small worker fleet (HPA scales this on EKS)
      resources:
        limits:
          memory: 1024M
          cpus: "1.0"
    depends_on:
      - redis

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        # live = dynamic UI wired to the api (nginx proxies /api). Set to "mock"
        # for the standalone static prototype with no backend.
        MILL_MODE: ${MILL_WEB_MODE:-live}
    image: mill-web
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api

  e2e:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.test
    image: mill-web-e2e
    environment:
      - CI=1

volumes:
  workdir: {}
  redis-data: {}   # Redis AOF/RDB persistence (jobs, history, journal survive restarts)
