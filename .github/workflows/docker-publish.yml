name: Build & Publish image

# Publishes the mill-backend image (API + worker + the served UI) to Docker Hub.
# Fires ONLY when a version tag is pushed (v1.2.3 → :1.2.3, :1.2, :latest) — never on a
# plain push to main. `workflow_dispatch` lets you also run it by hand from the Actions tab.
on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The backend image COPYs pre-built web bundles (dist-live at /, dist-prototype at
      # /prototype). Build them here so the image serves the current UI.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build the web UI bundles
        working-directory: apps/web
        run: |
          npm install --no-audit --no-fund
          VITE_MILL_MODE=live npx vite build --outDir dist-live --emptyOutDir
          npx vite build --base=/prototype/ --outDir dist-prototype --emptyOutDir

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Docker Hub repository this image is published to.
          images: wtiwti/the-mill
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=sha,format=short

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
