server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — client-side routes resolve to index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # long-cache hashed assets
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Control-plane API + tokenized ingress — same-origin reverse proxy to the api
  # service (so the live UI needs no CORS grant). SSE feeds (run history, reconcile
  # activity) require buffering off + HTTP/1.1 with an idle upstream connection.
  location ~ ^/(api|p|hooks|git)(/|$) {
    proxy_pass http://api:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
  }
}
